<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="パパ日記">
  <meta name="theme-color" content="#D4537E">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-180.png">
  <title>パパの妊娠日記</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@400;600&family=Kosugi+Maru&family=Yomogi&family=DotGothic16&family=Zen+Kurenaido&display=swap" rel="stylesheet">
  <style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Klee+One:wght@400;600&family=Kosugi+Maru&family=Zen+Kurenaido&family=Yomogi&family=DotGothic16&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --pink:#D4537E;--pink-l:#FBEAF0;--pink-m:#F4C0D1;
  --teal:#1D9E75;--teal-l:#E1F5EE;--teal-m:#9FE1CB;
  --amber:#EF9F27;--amber-l:#FAEEDA;
  --purple:#7F77DD;--purple-l:#EEEDFE;
  --text:#1a1a1a;--text2:#555;--text3:#999;
  --bg:#F7F4F1;--card:#fff;--border:rgba(0,0,0,0.08);
  --r:14px;--safe-b:env(safe-area-inset-bottom,0px);--safe-t:env(safe-area-inset-top,0px);
}
html{height:100%;-webkit-text-size-adjust:100%}
body{font-family:'Kosugi Maru',-apple-system,sans-serif;background:var(--bg);color:var(--text);
  overscroll-behavior:none;-webkit-tap-highlight-color:transparent;min-height:100vh}
button{cursor:pointer;font-family:inherit;border:none;background:none}
input,textarea,select{font-family:inherit}
.hidden{display:none!important}

/* ===== 表紙ページ ===== */
#coverPage{
  position:fixed;top:0;left:0;right:0;bottom:0;
  width:100%;height:100%;
  z-index:1000;
  display:flex;flex-direction:column;
  overflow:hidden;
  -webkit-overflow-scrolling:touch;
}
.cover-bg{
  position:absolute;top:0;left:0;right:0;bottom:0;
  width:100%;height:100%;
  background-size:cover;background-position:center;
}
.cover-overlay{
  position:absolute;top:0;left:0;right:0;bottom:0;
  background:linear-gradient(180deg,rgba(0,0,0,.3) 0%,rgba(0,0,0,.05) 40%,rgba(0,0,0,.5) 100%);
}
.cover-gear{
  position:relative;z-index:10;
  margin:16px 16px 0 auto;
  width:40px;height:40px;
  border-radius:10px;
  background:rgba(255,255,255,.3);
  display:flex;align-items:center;justify-content:center;
  font-size:20px;color:white;
  border:none;cursor:pointer;
  -webkit-appearance:none;
}
.cover-body{
  position:relative;z-index:10;
  flex:1;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:20px;gap:16px;
}
.cover-baby-card{
  background:rgba(255,255,255,.9);
  border-radius:20px;padding:18px 22px;
  min-width:140px;max-width:160px;
  display:flex;flex-direction:column;align-items:center;gap:8px;
  cursor:pointer;position:relative;
  -webkit-tap-highlight-color:transparent;
}
.cover-add{
  background:rgba(255,255,255,.2);
  border:2px dashed rgba(255,255,255,.8);
  border-radius:16px;color:white;
  font-size:15px;padding:14px 28px;
  display:flex;align-items:center;gap:8px;
  font-family:'Klee One',cursive;
  cursor:pointer;-webkit-appearance:none;
}
.cover-card-btn{
  width:28px;height:28px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  border:none;cursor:pointer;font-size:13px;
  -webkit-appearance:none;
}
.cover-card-btn.edit-btn{background:var(--pink-l);color:var(--pink);}
.cover-card-btn.del-btn{background:#fff0f0;color:#cc4444;}
.cover-hint{
  position:relative;z-index:10;
  text-align:center;
  color:rgba(255,255,255,.8);
  font-size:12px;
  padding:16px 0 30px;
}

/* 表紙設定 */
.bg-theme-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:6px}
.bg-theme-btn{width:70px;height:70px;border-radius:12px;border:3px solid transparent;background-size:cover;background-position:center;cursor:pointer;transition:.15s}
.bg-theme-btn.active{border-color:var(--pink)}
.custom-bg-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:6px}
.custom-bg-item{aspect-ratio:1;border-radius:10px;border:2px solid var(--border);background-size:cover;background-position:center;cursor:pointer;position:relative;display:flex;align-items:center;justify-content:center}
.custom-bg-item.active{border-color:var(--pink)}
.custom-bg-del{position:absolute;top:3px;right:3px;background:rgba(0,0,0,.5);color:white;border-radius:50%;width:20px;height:20px;font-size:10px;display:flex;align-items:center;justify-content:center;border:none;cursor:pointer}
.custom-bg-add{aspect-ratio:1;border-radius:10px;border:2px dashed var(--border);display:flex;align-items:center;justify-content:center;font-size:24px;color:var(--text3);cursor:pointer}

/* ===== メインアプリ ===== */
.main-app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
#appBgOverlay{position:fixed;inset:0;z-index:-1;background-size:cover;background-position:center}
#appBgOverlay.has-bg::after{content:'';position:fixed;inset:0;background:rgba(255,250,252,0.72)}

/* INSTALL */
.install-banner{background:var(--pink);color:white;padding:10px 14px;padding-top:calc(10px + var(--safe-t))}
.install-content{display:flex;align-items:center;gap:10px;max-width:480px;margin:0 auto}
.install-title{font-size:13px;font-weight:600}.install-sub{font-size:11px;opacity:.9;margin-top:2px}
.install-content button{margin-left:auto;background:rgba(255,255,255,.2);color:white;border-radius:50%;width:28px;height:28px;font-size:13px;display:flex;align-items:center;justify-content:center}

/* HEADER */
.app-header{background:rgba(255,255,255,.94);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  border-bottom:1px solid var(--border);padding:8px 12px;padding-top:calc(8px + var(--safe-t));
  display:flex;align-items:center;gap:8px;flex-shrink:0}
.header-back-btn{width:36px;height:36px;border-radius:9px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--text2);flex-shrink:0}
.header-center{flex:1;min-width:0;text-align:center}
.app-title{font-family:'Klee One',cursive;font-size:16px;color:var(--pink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.app-subtitle{font-size:10px;color:var(--text3)}
.header-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.header-week-badge{background:var(--pink-l);color:var(--pink);font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;white-space:nowrap}
.icon-btn{width:36px;height:36px;border-radius:9px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:19px;color:var(--text2);flex-shrink:0}

/* TOP TABS */
.top-tabs{display:flex;background:white;border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto;scrollbar-width:none}
.top-tabs::-webkit-scrollbar{display:none}
.top-tab{flex:1;min-width:70px;padding:9px 4px 7px;font-size:11px;color:var(--text3);border-bottom:2px solid transparent;transition:.15s;white-space:nowrap;display:flex;flex-direction:column;align-items:center;gap:2px}
.top-tab i{font-size:18px}
.top-tab.active{color:var(--pink);border-bottom-color:var(--pink);font-weight:500}

/* MAIN */
.main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 14px 20px;max-width:480px;margin:0 auto;width:100%}
.view{display:none}.view.active{display:block}

/* WEEK HERO */
.week-hero{background:linear-gradient(135deg,#FBEAF0,#E8F8F2);border-radius:var(--r);padding:14px;margin-bottom:10px;display:flex;align-items:center;gap:12px}
.week-baby-wrap{flex-shrink:0;width:72px;height:72px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.6);border-radius:50%}
.week-info{flex:1;min-width:0}
.week-badge{display:inline-block;background:var(--pink);color:white;font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;margin-bottom:5px}
.week-title{font-size:16px;margin-bottom:3px}
.week-desc{font-size:11px;color:var(--text2);line-height:1.5;margin-bottom:4px}
.days-until{font-size:11px;color:var(--pink);font-weight:500}

/* STATS */
.week-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
.stat-card{background:var(--card);border-radius:12px;padding:11px 6px 9px;text-align:center;border:1px solid var(--border)}
.stat-val{font-size:20px;font-weight:700;color:var(--teal);line-height:1}
.stat-val.small-val{font-size:13px}
.stat-unit{font-size:10px;color:var(--text3);margin-top:1px}
.stat-label{font-size:10px;color:var(--text3);margin-top:2px}

/* SECTION CARD */
.section-card{background:rgba(255,255,255,.93);border-radius:var(--r);border:1px solid var(--border);overflow:hidden;margin-bottom:10px}
.section-hd{padding:10px 14px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:6px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.section-hd.pink{background:var(--pink-l);color:var(--pink)}
.section-hd.teal{background:var(--teal-l);color:var(--teal)}
.section-hd.purple{background:var(--purple-l);color:var(--purple)}
.section-hd.gray{background:#F5F3EF;color:var(--text2)}
.section-bd{padding:12px 14px}

/* DATE NAV inline */
.date-nav-inline{margin-left:auto;display:flex;align-items:center;gap:4px}
.date-nav-btn{width:28px;height:28px;border-radius:7px;background:var(--pink-l);color:var(--pink);display:flex;align-items:center;justify-content:center;font-size:15px}
.date-nav-btn:disabled{opacity:.3}
.date-nav-label{font-size:11px;color:var(--text2);min-width:70px;text-align:center}
.date-jump-btn{background:var(--pink);color:white;border:none;border-radius:7px;padding:3px 8px;font-size:11px;cursor:pointer}

/* WEEK GRID */
.week-grid{display:flex;flex-wrap:wrap;gap:6px}
.week-btn{width:40px;height:40px;border-radius:9px;border:1.5px solid var(--border);background:var(--bg);font-size:13px;display:flex;align-items:center;justify-content:center;color:var(--text);transition:.12s;position:relative;flex-shrink:0}
.week-btn:active{transform:scale(.92)}
.week-btn.active{background:var(--pink);color:white;border-color:var(--pink);font-weight:600}
.week-btn.has-diary{background:var(--teal-l);border-color:var(--teal);color:var(--teal)}
.week-btn.active.has-diary{background:var(--pink);color:white;border-color:var(--pink)}
.week-btn .dot-mark{position:absolute;top:-3px;right:-3px;width:8px;height:8px;background:var(--teal);border-radius:50%;border:1.5px solid white}

/* TRIVIA */
.trivia-box{background:linear-gradient(135deg,#FFF8E1,#E8F5E9);border-radius:12px;padding:12px}
.trivia-fact{font-size:13px;color:#333;line-height:1.8;margin-bottom:8px}
.trivia-papa{background:rgba(255,255,255,.7);border-radius:8px;padding:8px 12px;font-size:12px;color:var(--teal);border-left:3px solid var(--teal);margin-bottom:6px;line-height:1.6}
.trivia-order{font-size:11px;color:#888;font-style:italic}

/* FORM */
.form-row{margin-bottom:12px}.form-row:last-child{margin-bottom:0}
.form-row.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-label{display:block;font-size:12px;color:var(--text2);margin-bottom:4px;font-weight:500}
.text-input{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;background:var(--bg);color:var(--text);-webkit-appearance:none}
.text-input:focus{outline:none;border-color:var(--pink);background:white}
.textarea{width:100%;padding:11px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;resize:none;min-height:88px;background:var(--bg);color:var(--text);line-height:1.7;-webkit-appearance:none}
.textarea:focus{outline:none;border-color:var(--pink);background:white}
.radio-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
.radio-btn{display:flex;align-items:center;gap:5px;font-size:12px;cursor:pointer;background:var(--bg);padding:6px 10px;border-radius:8px;border:1px solid var(--border)}
.radio-btn input{accent-color:var(--pink)}
.sibling-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.sibling-row input{flex:1}
.sibling-row button{width:30px;height:30px;border-radius:8px;background:var(--pink-l);color:var(--pink);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.add-sibling-btn{width:100%;padding:10px;border:2px dashed var(--teal-m);border-radius:10px;background:var(--teal-l);color:var(--teal);font-size:13px;display:flex;align-items:center;justify-content:center;gap:6px;margin-top:4px}

/* PHOTO */
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:8px;margin-bottom:2px}
.photo-thumb{aspect-ratio:1;border-radius:10px;overflow:hidden;position:relative;background:var(--teal-l);border:1px solid var(--border)}
.photo-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.photo-thumb .rm-btn{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.5);color:white;border-radius:50%;width:22px;height:22px;font-size:11px;display:flex;align-items:center;justify-content:center;border:none;cursor:pointer}
.upload-btn{display:flex;align-items:center;gap:8px;margin-top:8px;padding:10px 14px;border:2px dashed var(--pink-m);border-radius:10px;background:var(--pink-l);color:var(--pink);font-size:13px;cursor:pointer}
.upload-btn.teal-btn{border-color:var(--teal-m);background:var(--teal-l);color:var(--teal)}
.upload-btn i{font-size:19px}
input[type=file]{display:none}
.save-btn{width:100%;margin-top:10px;padding:13px;background:var(--pink);color:white;border-radius:12px;font-size:15px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:8px;transition:.15s}
.save-btn:active{transform:scale(.98);background:#b84069}
.save-btn.teal-save{background:var(--teal)}.save-btn.teal-save:active{background:#0f6e56}
.bg-clear-btn{background:none;border:1px solid var(--border);border-radius:7px;padding:5px 10px;font-size:12px;color:var(--text3);cursor:pointer}
.cover-bg-preview{width:100%;aspect-ratio:16/5;border-radius:10px;background-size:cover;background-position:center;margin-top:8px;border:1px solid var(--border);display:none}
.cover-bg-preview.has-bg{display:block}

/* FLIP */
.flip-card{background:var(--card);border-radius:20px;border:1px solid var(--border);padding:20px 18px 18px;margin-bottom:12px;position:relative;overflow:hidden;box-shadow:0 2px 16px rgba(212,83,126,.08)}
.flip-week-bg{position:absolute;top:-10px;right:-8px;font-family:'Klee One',cursive;font-size:96px;font-weight:600;color:var(--pink);opacity:.07;line-height:1;pointer-events:none;user-select:none}
.flip-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.flip-badge{background:var(--pink-l);color:var(--pink);font-size:12px;font-weight:500;padding:3px 12px;border-radius:20px}
.flip-trim{font-size:11px;color:var(--text3);background:var(--bg);padding:3px 10px;border-radius:20px}
.flip-baby-wrap{display:flex;justify-content:center;margin-bottom:10px}
.flip-title{font-size:20px;text-align:center;margin-bottom:8px}
.flip-chips{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:10px}
.flip-chip{background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:3px 10px;font-size:11px;color:var(--text2)}
.flip-desc{font-size:13px;color:var(--text2);line-height:1.7;text-align:center;margin-bottom:8px}
.flip-comment{background:var(--teal-l);border-radius:10px;padding:9px 13px;font-size:13px;color:#085041;border-left:3px solid var(--teal);margin-top:8px;line-height:1.6}
.flip-photo{margin-top:8px}.flip-photo img{width:100%;border-radius:10px;max-height:150px;object-fit:cover}
.flip-nav{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}
.flip-nav-btn{flex:1;padding:10px 12px;background:var(--card);border:1.5px solid var(--border);border-radius:12px;font-size:13px;color:var(--text);display:flex;align-items:center;gap:4px;justify-content:center;transition:.15s}
.flip-nav-btn:active{background:var(--pink-l);border-color:var(--pink);color:var(--pink)}
.flip-nav-btn:disabled{opacity:.3}
.flip-wk-ind{font-family:'Klee One',cursive;font-size:16px;font-weight:600;color:var(--pink);min-width:52px;text-align:center}
.flip-dots-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;padding:2px 0 6px}
.flip-dots{display:flex;gap:4px;min-width:max-content;padding:0 2px}
.flip-dot{width:26px;height:26px;border-radius:6px;background:var(--bg);border:1px solid var(--border);font-size:10px;color:var(--text3);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.flip-dot.has{background:var(--teal-l);border-color:var(--teal);color:var(--teal)}
.flip-dot.cur{background:var(--pink);border-color:var(--pink);color:white;font-weight:700}

/* CALENDAR */
.cal-nav-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.cal-title{font-size:17px}
.cal-dow-row{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:4px}
.cal-dow-row span{text-align:center;font-size:11px;color:var(--text3);font-weight:500;padding:3px 0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:8px}
.cal-day{aspect-ratio:1;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;position:relative;color:var(--text)}
.cal-day:active{background:var(--pink-l)}
.cal-day.today{background:var(--bg);border:2px solid var(--text3);font-weight:700}
.cal-day.has-papa{background:var(--pink-l)}
.cal-day.has-papa::after{content:'';position:absolute;bottom:2px;width:5px;height:5px;background:var(--pink);border-radius:50%}
.cal-legend{display:flex;gap:14px;justify-content:center;font-size:11px;color:var(--text3);margin-bottom:10px}
.cal-legend span{display:flex;align-items:center;gap:4px}
.dot{width:7px;height:7px;border-radius:50%}.pink-dot{background:var(--pink)}.gray-dot{border:2px solid var(--text3)}

/* EXPORT / INSTA */
.insta-preview-wrap{display:flex;flex-direction:column;align-items:center;margin-bottom:16px}
.export-preview-label{font-size:11px;color:var(--text3);margin-top:6px}
.insta-card{width:240px;height:240px;border-radius:18px;background:linear-gradient(135deg,#FBEAF0,#E1F5EE);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;border:1px solid var(--border)}
.insta-bg-c{position:absolute;width:110px;height:110px;border-radius:50%;pointer-events:none}
.insta-bg-c.top-right{top:-28px;right:-28px;background:var(--pink-m);opacity:.4}
.insta-bg-c.bottom-left{bottom:-28px;left:-28px;background:var(--teal-m);opacity:.4}
.insta-inner{position:relative;z-index:1;text-align:center;padding:14px}
.insta-wk-label{font-size:9px;color:var(--pink);font-weight:600;letter-spacing:4px;margin-bottom:2px}
.insta-wk-num{font-family:'Klee One',cursive;font-size:58px;font-weight:600;color:var(--pink);line-height:1;margin-bottom:3px}
.insta-div{width:32px;height:2px;background:var(--pink);margin:6px auto;border-radius:2px}
.insta-title{font-family:'Klee One',cursive;font-size:13px;font-weight:600;color:var(--text);margin-bottom:3px}
.insta-body{font-size:10px;color:var(--text2);line-height:1.5}
.insta-tags{font-size:8px;color:var(--pink);margin-top:5px}
.export-list{display:flex;flex-direction:column;gap:8px}
.export-item{background:rgba(255,255,255,.93);border:1px solid var(--border);border-radius:var(--r);padding:13px;display:flex;align-items:center;gap:12px;text-align:left;transition:.15s;width:100%}
.export-item:active{background:var(--pink-l);border-color:var(--pink-m)}
.export-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:21px;flex-shrink:0}
.insta-grad{background:linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);color:white}
.pink-icon{background:var(--pink-l);color:var(--pink)}.teal-icon{background:var(--teal-l);color:var(--teal)}
.purple-icon{background:var(--purple-l);color:var(--purple)}.amber-icon{background:var(--amber-l);color:var(--amber)}
.gray-icon{background:var(--bg);color:var(--text2)}
.export-name{font-size:14px;font-weight:500;color:var(--text);margin-bottom:2px}
.export-desc{font-size:11px;color:var(--text3)}
.export-info{flex:1;min-width:0}
.export-item>i:last-child{font-size:17px;color:var(--text3);flex-shrink:0}

/* MODAL */
.modal-overlay{position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.45);display:flex;align-items:flex-end}
.modal-card{background:var(--card);border-radius:20px 20px 0 0;width:100%;max-height:88vh;overflow-y:auto;padding-bottom:var(--safe-b);animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-hd{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--card);z-index:1}
.modal-title{font-size:17px;font-weight:600}.modal-bd{padding:14px 18px}
.danger-btn{width:100%;margin-top:14px;padding:13px;background:#fff0f0;color:#cc2222;border:1.5px solid #ffcccc;border-radius:12px;font-size:14px;font-weight:500}
.month-item{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border);cursor:pointer;font-size:14px}
.month-item:last-child{border-bottom:none}.month-item:active{color:var(--pink)}

/* FONT SELECTOR */
.font-selector{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.font-btn{flex:1;min-width:0;padding:8px 4px;border:2px solid var(--border);border-radius:9px;background:var(--bg);display:flex;flex-direction:column;align-items:center;gap:3px;font-size:11px;color:var(--text2);transition:.15s}
.font-btn.active{border-color:var(--pink);background:var(--pink-l);color:var(--pink)}
.fp-maru{font-family:'Kosugi Maru';font-size:20px}.fp-tegaki{font-family:'Yomogi';font-size:20px}
.fp-pop{font-family:'DotGothic16';font-size:20px}.fp-ehon{font-family:'Zen Kurenaido';font-size:20px}
.fp-choutai{font-family:'Klee One';font-size:20px;transform:scaleX(.72);display:inline-block}
.font-maru{font-family:'Kosugi Maru',sans-serif!important}

/* TOAST */
.toast{position:fixed;bottom:calc(30px + var(--safe-b));left:50%;transform:translateX(-50%) translateY(20px);background:rgba(30,30,30,.88);color:white;padding:10px 20px;border-radius:22px;font-size:13px;opacity:0;transition:all .3s;z-index:500;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ===== ロードマップ ===== */
.rm-section{background:rgba(255,255,255,.93);border-radius:var(--r);border:1px solid var(--border);overflow:hidden;margin-bottom:10px}
.rm-hd{padding:10px 14px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:6px;border-bottom:1px solid var(--border)}
.rm-body{padding:10px 14px}
.rm-item{font-size:13px;color:var(--text);padding:6px 0;border-bottom:1px solid var(--border);line-height:1.5}
.rm-item:last-child{border-bottom:none}
.rm-check-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);cursor:pointer}
.rm-check-item:last-child{border-bottom:none}
.rm-check-box{width:22px;height:22px;border-radius:6px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;background:var(--bg);color:var(--teal);font-weight:700;transition:.15s}
.rm-check-box.checked{background:var(--teal);border-color:var(--teal);color:white}
.rm-check-label{font-size:13px;color:var(--text)}
.rm-check-label.done{text-decoration:line-through;color:var(--text3)}
.rm-guide-card{background:var(--bg);border-radius:10px;padding:12px;margin-bottom:8px;border:1px solid var(--border)}
.rm-guide-card:last-child{margin-bottom:0}
.rm-guide-title{font-size:14px;font-weight:600;color:var(--teal);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.rm-guide-row{display:flex;gap:8px;font-size:12px;color:var(--text);padding:3px 0;line-height:1.5}
.rm-guide-key{color:var(--text3);width:36px;flex-shrink:0;font-weight:500}

</style>
</head>
<body>

<!-- ===== 表紙 ===== -->
<div id="coverPage">
  <div id="coverBg"></div>
  <div class="cover-overlay"></div>
  <button class="cover-gear" onclick="openCoverSettings()"><i class="ti ti-settings"></i></button>
  <div class="cover-body">
    <div id="coverCards"></div>
    <button class="cover-add" onclick="addBaby()"><i class="ti ti-plus"></i> New Baby</button>
  </div>
  <div class="cover-hint">タップして日記を開く</div>
</div>

<!-- 表紙設定 -->
<div id="coverModal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeCoverSettings()">
  <div class="modal-card">
    <div class="modal-hd">
      <span class="modal-title">表紙の背景を変更</span>
      <button class="icon-btn" onclick="closeCoverSettings()"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-bd">
      <div class="form-label" style="margin-bottom:8px">自分の写真を設定（最大3枚）</div>
      <div id="bgCustoms" style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px"></div>
      <label class="upload-btn" for="bgFileInput"><i class="ti ti-photo-plus"></i> 写真を追加</label>
      <input type="file" id="bgFileInput" accept="image/*">
      <button onclick="selBg(0);closeCoverSettings();" style="width:100%;margin-top:12px;padding:11px;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;font-size:13px;color:var(--text2);cursor:pointer">デフォルト画像に戻す</button>
    </div>
  </div>
</div>

<!-- ===== メインアプリ ===== -->
<div id="mainApp" style="display:none;flex-direction:column;height:100vh;overflow:hidden">

  <div id="installBanner" class="install-banner" style="display:none">
    <div class="install-content">
      <span>👶</span>
      <div><div class="install-title">ホーム画面に追加</div><div class="install-sub">Safari の 共有 → ホーム画面に追加</div></div>
      <button onclick="dismissInstall()">✕</button>
    </div>
  </div>

  <header class="app-header">
    <button class="header-back-btn" onclick="goToCover()"><i class="ti ti-chevron-left"></i></button>
    <div class="header-center">
      <div class="app-title" id="appTitle">パパの妊娠日記</div>
      <div class="app-subtitle" id="headerSub">成長を記録しよう</div>
    </div>
    <div style="display:flex;align-items:center;gap:6px">
      <span class="header-week-badge" id="headerWeekBadge"></span>
      <button class="icon-btn" onclick="openSettings()"><i class="ti ti-settings"></i></button>
    </div>
  </header>

  <div class="top-tabs">
    <button class="top-tab active" onclick="showView('record')" id="tab-record"><i class="ti ti-pencil"></i><span>記録</span></button>
    <button class="top-tab" onclick="showView('flip')" id="tab-flip"><i class="ti ti-cards"></i><span>日めくり</span></button>
    <button class="top-tab" onclick="showView('calendar')" id="tab-calendar"><i class="ti ti-calendar"></i><span>カレンダー</span></button>
    <button class="top-tab" onclick="showView('roadmap')" id="tab-roadmap"><i class="ti ti-map"></i><span>やること</span></button>
    <button class="top-tab" onclick="showView('export')" id="tab-export"><i class="ti ti-share"></i><span>出力</span></button>
  </div>

  <main class="main" id="mainContent">

    <!-- 記録 -->
    <div id="view-record" class="view active">
      <div class="week-hero">
        <div class="week-baby-wrap"><svg id="babyIconMain" viewBox="0 0 80 80" width="68" height="68"></svg></div>
        <div class="week-info">
          <span class="week-badge" id="weekBadge">妊娠--週</span>
          <div class="week-title" id="weekTitle">週数を選んでください</div>
          <div class="week-desc" id="weekDesc"></div>
          <div class="days-until" id="daysUntil"></div>
        </div>
      </div>
      <div class="week-stats">
        <div class="stat-card"><div class="stat-val" id="statSize">-</div><div class="stat-unit" id="statSizeU">mm</div><div class="stat-label">頭殿長</div></div>
        <div class="stat-card"><div class="stat-val" id="statWeight">-</div><div class="stat-unit" id="statWeightU">g</div><div class="stat-label">体重目安</div></div>
        <div class="stat-card"><div class="stat-val small-val" id="statSimilar">-</div><div class="stat-unit"></div><div class="stat-label">大きさ</div></div>
      </div>
      <!-- 週数選択 折りたたみ -->
      <div class="section-card">
        <div class="section-hd gray" onclick="toggleWeekGrid()" style="cursor:pointer">
          <i class="ti ti-calendar-week"></i> 妊娠週数を選ぶ
          <span id="weekBadgeSub" style="margin-left:6px;background:var(--pink);color:white;font-size:11px;padding:2px 9px;border-radius:20px"></span>
          <i class="ti ti-chevron-down" id="weekChevron" style="margin-left:auto;transition:.2s"></i>
        </div>
        <div id="weekGridWrap" style="display:none"><div class="section-bd"><div class="week-grid" id="weekGrid"></div></div></div>
      </div>
      <!-- パパ日記 -->
      <div class="section-card">
        <div class="section-hd pink">
          <i class="ti ti-pencil"></i> パパ日記
          <div style="margin-left:auto;display:flex;align-items:center;gap:4px">
            <button class="date-nav-btn" onclick="moveDiaryDate(-1)"><i class="ti ti-chevron-left"></i></button>
            <span class="date-nav-label" id="diaryDateLabel"></span>
            <button class="date-nav-btn" id="dateNextBtn" onclick="moveDiaryDate(1)"><i class="ti ti-chevron-right"></i></button>
            <button class="date-jump-btn" onclick="jumpToToday()">今日</button>
          </div>
        </div>
        <div class="section-bd">
          <textarea class="textarea" id="dailyMsg" placeholder="わが子へのメッセージ、今日の気持ち..."></textarea>
          <div id="dailyPhotoGrid" class="photo-grid"></div>
          <label class="upload-btn" for="dailyPhotoInput"><i class="ti ti-camera-plus"></i> 写真を追加</label>
          <input type="file" id="dailyPhotoInput" accept="image/*" multiple>
          <button class="save-btn" onclick="saveDailyDiary()"><i class="ti ti-heart-filled"></i> 保存する</button>
        </div>
      </div>
      <!-- ママのお腹 -->
      <div class="section-card">
        <div class="section-hd teal"><i class="ti ti-heart"></i> ママのお腹（週ごと）</div>
        <div class="section-bd">
          <div id="mamaPhotoGrid" class="photo-grid"></div>
          <label class="upload-btn teal-btn" for="mamaPhotoInput"><i class="ti ti-camera-plus"></i> お腹の写真</label>
          <input type="file" id="mamaPhotoInput" accept="image/*" multiple>
          <textarea class="textarea" id="mamaMsg" placeholder="今週のお腹の変化..."></textarea>
          <button class="save-btn teal-save" onclick="saveMamaDiary()"><i class="ti ti-heart-filled"></i> 保存する</button>
        </div>
      </div>
      <!-- 豆知識 -->
      <div class="section-card">
        <div class="section-hd purple"><i class="ti ti-bulb"></i> パパの豆知識</div>
        <div class="section-bd"><div id="triviaBox"></div></div>
      </div>
    </div>

    <!-- 日めくり -->
    <div id="view-flip" class="view">
      <div class="flip-card" id="flipCard">
        <div class="flip-week-bg" id="flipWeekBg"></div>
        <div class="flip-top">
          <span class="flip-badge" id="flipBadge">妊娠12週</span>
          <span class="flip-trim" id="flipTrim">妊娠初期</span>
        </div>
        <div style="display:flex;justify-content:center;margin-bottom:10px">
          <svg id="babyIconFlip" viewBox="0 0 80 80" width="90" height="90"></svg>
        </div>
        <div class="flip-title" id="flipTitle"></div>
        <div id="flipChips" style="display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:10px"></div>
        <div class="flip-desc" id="flipDesc"></div>
        <div class="flip-comment" id="flipComment" style="display:none"></div>
        <div id="flipPhoto"></div>
      </div>
      <div class="flip-nav">
        <button class="flip-nav-btn" id="flipPrevBtn" onclick="flipPrev()"><i class="ti ti-chevron-left"></i> 前の週</button>
        <div class="flip-wk-ind" id="flipWkInd">12/40</div>
        <button class="flip-nav-btn" id="flipNextBtn" onclick="flipNext()">次の週 <i class="ti ti-chevron-right"></i></button>
      </div>
      <div style="overflow-x:auto;padding:4px 0 8px"><div class="flip-dots" id="flipDots"></div></div>
      <div class="section-card" style="margin-top:12px">
        <div class="section-hd pink"><i class="ti ti-pencil"></i> この週のパパ記録</div>
        <div id="flipWeekDiary"></div>
      </div>
    </div>

    <!-- カレンダー -->
    <div id="view-calendar" class="view">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <button class="icon-btn" onclick="calPrev()"><i class="ti ti-chevron-left"></i></button>
        <div style="font-size:17px;font-weight:600" id="calTitle"></div>
        <button class="icon-btn" onclick="calNext()"><i class="ti ti-chevron-right"></i></button>
      </div>
      <div class="cal-dow-row"><span>日</span><span>月</span><span>火</span><span>水</span><span>木</span><span>金</span><span>土</span></div>
      <div class="cal-grid" id="calGrid"></div>
      <div class="cal-legend">
        <span><span class="dot pink-dot"></span>日記あり</span>
        <span><span class="dot gray-dot"></span>今日</span>
        <span style="font-size:11px;color:var(--pink)">📝 タップ→日記へ</span>
      </div>
    </div>

    <!-- やることリスト -->
    <div id="view-roadmap" class="view">
      <div id="roadmapContent"></div>
    </div>

    <!-- 出力 -->
    <div id="view-export" class="view">
      <div style="display:flex;flex-direction:column;align-items:center;margin-bottom:14px">
        <div class="insta-card">
          <div class="insta-bg-c top-right"></div>
          <div class="insta-bg-c bottom-left"></div>
          <div class="insta-inner">
            <div class="insta-wk-label">W E E K</div>
            <div class="insta-wk-num" id="instaWeekNum">--</div>
            <div class="insta-div"></div>
            <div class="insta-title" id="instaTitle">妊娠記録</div>
            <div class="insta-body" id="instaBody">週数を選んで記録を始めよう</div>
            <div class="insta-tags">#パパ日記 #妊娠記録</div>
          </div>
        </div>
        <div style="font-size:11px;color:var(--text3);margin-top:6px">インスタグラム用プレビュー</div>
      </div>
      <div class="export-list">
        <button class="export-item" onclick="exportInstagram()"><div class="export-icon insta-grad"><i class="ti ti-brand-instagram"></i></div><div class="export-info"><div class="export-name">インスタ用画像</div><div class="export-desc">1:1正方形 PNG</div></div><i class="ti ti-download"></i></button>
        <button class="export-item" onclick="exportBabyGrowth()"><div class="export-icon pink-icon"><i class="ti ti-heart"></i></div><div class="export-info"><div class="export-name">ママのお腹 成長記録</div><div class="export-desc">週ごとの写真1枚 A4対応</div></div><i class="ti ti-download"></i></button>
        <button class="export-item" onclick="showMonthPicker()"><div class="export-icon teal-icon"><i class="ti ti-calendar-month"></i></div><div class="export-info"><div class="export-name">月別パパ日記</div><div class="export-desc">1ヶ月分をA4 1枚に</div></div><i class="ti ti-download"></i></button>
        <button class="export-item" onclick="exportBooklet()"><div class="export-icon purple-icon"><i class="ti ti-book"></i></div><div class="export-info"><div class="export-name">電子冊子</div><div class="export-desc">表紙＋成長記録＋日記</div></div><i class="ti ti-external-link"></i></button>
        <button class="export-item" onclick="exportJSON()"><div class="export-icon amber-icon"><i class="ti ti-database-export"></i></div><div class="export-info"><div class="export-name">バックアップ</div><div class="export-desc">JSONで全データ保存</div></div><i class="ti ti-download"></i></button>
        <button class="export-item" onclick="importJSON()"><div class="export-icon gray-icon"><i class="ti ti-database-import"></i></div><div class="export-info"><div class="export-name">データを復元</div><div class="export-desc">バックアップから読み込み</div></div><i class="ti ti-upload"></i></button>
      </div>
      <input type="file" id="importInput" accept=".json" style="display:none">
    </div>

  </main>

  <!-- 設定モーダル -->
  <div id="settingsModal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeSettings()">
    <div class="modal-card">
      <div class="modal-hd"><span class="modal-title">設定</span><button class="icon-btn" onclick="closeSettings()"><i class="ti ti-x"></i></button></div>
      <div class="modal-bd">
        <div class="form-row"><label class="form-label">タイトル</label><input type="text" class="text-input" id="appTitleInput" placeholder="パパの妊娠日記" oninput="previewAppTitle()"></div>
        <div class="form-row"><label class="form-label">出産予定日</label><input type="date" class="text-input" id="dueDateInput" onchange="saveDueDate()"></div>
        <div class="form-row"><label class="form-label">赤ちゃんのニックネーム</label><input type="text" class="text-input" id="babyNickInput" placeholder="例：ぷに" oninput="saveBabyNick()"></div>
        <div class="form-row">
          <label class="form-label">アプリ背景画像</label>
          <div style="display:flex;gap:8px"><label class="upload-btn" for="appBgInput" style="margin-top:0;flex:1"><i class="ti ti-photo"></i> 設定</label><button class="bg-clear-btn" onclick="clearAppBg()">削除</button></div>
          <input type="file" id="appBgInput" accept="image/*">
          <div id="appBgPreview" class="cover-bg-preview"></div>
        </div>
        <button class="danger-btn" onclick="confirmClearAll()">すべてのデータを削除</button>
      </div>
    </div>
  </div>

  <!-- 月選択モーダル -->
  <div id="monthPickerModal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeMonthPicker()">
    <div class="modal-card">
      <div class="modal-hd"><span class="modal-title">月を選ぶ</span><button class="icon-btn" onclick="closeMonthPicker()"><i class="ti ti-x"></i></button></div>
      <div class="modal-bd" id="monthPickerList"></div>
    </div>
  </div>

  <!-- 誕生情報モーダル -->
  <div id="birthModal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeBirthModal()">
    <div class="modal-card">
      <div class="modal-hd"><span class="modal-title">誕生情報・表紙</span><button class="icon-btn" onclick="closeBirthModal()"><i class="ti ti-x"></i></button></div>
      <div class="modal-bd">
        <div class="form-row"><label class="form-label">タイトル</label><input type="text" class="text-input" id="bookTitle" placeholder="〇〇へ、パパからの贈り物"></div>
        <div class="form-row">
          <label class="form-label">文字スタイル</label>
          <div class="font-selector">
            <button class="font-btn active" data-font="maru" onclick="selectFont('maru',this)"><span class="fp-maru">あ</span>丸文字</button>
            <button class="font-btn" data-font="tegaki" onclick="selectFont('tegaki',this)"><span class="fp-tegaki">あ</span>手書き</button>
            <button class="font-btn" data-font="pop" onclick="selectFont('pop',this)"><span class="fp-pop">あ</span>ポップ</button>
            <button class="font-btn" data-font="ehon" onclick="selectFont('ehon',this)"><span class="fp-ehon">あ</span>絵本風</button>
          </div>
        </div>
        <div class="form-row"><label class="form-label">表紙背景</label><div style="display:flex;gap:8px"><label class="upload-btn" for="coverBgFileInput" style="margin-top:0;flex:1"><i class="ti ti-photo"></i> 設定</label><button class="bg-clear-btn" onclick="clearCoverBg()">削除</button></div><input type="file" id="coverBgFileInput" accept="image/*"><div id="coverBgPreview" class="cover-bg-preview"></div></div>
        <div class="form-row"><label class="form-label">赤ちゃんのお名前</label><input type="text" class="text-input" id="babyNameBirth" placeholder="〇〇ちゃん"></div>
        <div class="form-row"><label class="form-label">性別</label><div class="radio-row"><label class="radio-btn"><input type="radio" name="gender" value="男の子"> 👦 男の子</label><label class="radio-btn"><input type="radio" name="gender" value="女の子"> 👧 女の子</label><label class="radio-btn"><input type="radio" name="gender" value=""> 秘密</label></div></div>
        <div class="form-row"><label class="form-label">出産日時</label><input type="datetime-local" class="text-input" id="birthDatetime"></div>
        <div class="form-row"><label class="form-label">出産した場所</label><input type="text" class="text-input" id="birthPlace" placeholder="〇〇病院"></div>
        <div class="form-row two-col"><div><label class="form-label">体重</label><input type="text" class="text-input" id="birthWeight" placeholder="3200g"></div><div><label class="form-label">身長</label><input type="text" class="text-input" id="birthHeight" placeholder="50cm"></div></div>
        <div class="form-row two-col"><div><label class="form-label">👨 パパ</label><input type="text" class="text-input" id="papaName" placeholder="名前"></div><div><label class="form-label">👩 ママ</label><input type="text" class="text-input" id="mamaName" placeholder="名前"></div></div>
        <div id="siblingRows"></div>

const COVER_PRESETS=[
  {label:'🌻 デフォルト',img:COVER_IMG},
  {label:'🌸 ピンク',  grad:'linear-gradient(160deg,#FFD6E7 0%,#FFAFCC 50%,#FFC8DD 100%)'},
  {label:'🌿 グリーン',grad:'linear-gradient(160deg,#D8F3DC 0%,#95D5B2 50%,#52B788 100%)'},
  {label:'☁️ ブルー',  grad:'linear-gradient(160deg,#CAF0F8 0%,#90E0EF 50%,#48CAE4 100%)'},
  {label:'🌅 オレンジ',grad:'linear-gradient(160deg,#FFEDD8 0%,#FFB347 50%,#FF7C2A 100%)'},
];

function initCoverPage(){
  renderCoverBg();
  renderCoverBabies();
}

function renderCoverBg(){
  const el=document.getElementById('coverBg');if(!el)return;
  if(G.coverBgIndex>=COVER_PRESETS.length){
    const ci=G.coverBgIndex-COVER_PRESETS.length;
    if(G.customBgs[ci]){
      el.style.backgroundImage=`url(${G.customBgs[ci]})`;
      el.style.backgroundSize='cover';el.style.backgroundPosition='center';
      return;
    }
  }
  const p=COVER_PRESETS[G.coverBgIndex]||COVER_PRESETS[0];
  if(p.img){
    el.style.backgroundImage=`url(${p.img})`;
    el.style.backgroundSize='cover';el.style.backgroundPosition='center top';
  } else {
    el.style.backgroundImage=p.grad;
    el.style.backgroundSize='';
  }
}

function renderCoverBabies(){
  const c=document.getElementById('coverCards');if(!c)return;
  c.innerHTML='';
  G.babies.forEach(b=>{
    const days=calcDays(b.data.dueDate);
    const card=document.createElement('div');
    card.className='cover-baby-card';
    card.innerHTML=`
      <div style="font-size:34px">👶</div>
      <div style="font-family:'Klee One',cursive;font-size:17px;font-weight:600;color:var(--pink);text-align:center">${b.name}</div>
      <div style="font-size:11px;color:var(--text3);text-align:center">${b.data.currentWeek||12}週${days!==null?' / あと'+days+'日':''}</div>
      <div style="display:flex;gap:6px;margin-top:4px">
        <button class="cover-card-btn edit-btn" onclick="editName('${b.id}',event)" title="名前を編集"><i class="ti ti-pencil" style="font-size:13px"></i></button>
        <button class="cover-card-btn del-btn" id="del_${b.id}" onclick="deleteBaby('${b.id}',event)" title="削除"><i class="ti ti-trash" style="font-size:13px"></i></button>
      </div>`;
    // カード本体タップで日記を開く（ボタン以外）
    card.addEventListener('click', function(e){
      if(e.target.closest('button')) return;
      openBaby(b.id);
    });
    c.appendChild(card);
  });
}

// 削除（2段階確認）
const _deleteConfirm = {};
function deleteBaby(id, e){
  e.stopPropagation();
  const btn = document.getElementById('del_'+id);
  if(_deleteConfirm[id]){
    // 2回目クリック → 本当に削除
    G.babies = G.babies.filter(b=>b.id!==id);
    if(G.activeBabyId===id) G.activeBabyId=null;
    delete _deleteConfirm[id];
    saveG();
    renderCoverBabies();
    showToast('🗑 削除しました');
  } else {
    // 1回目 → 確認表示
    _deleteConfirm[id] = true;
    if(btn){
      btn.style.background='#ffdddd';
      btn.style.color='#cc2222';
      btn.innerHTML='<span style="font-size:10px;white-space:nowrap">本当に削除？</span>';
    }
    // 3秒で元に戻す
    setTimeout(()=>{
      delete _deleteConfirm[id];
      renderCoverBabies();
    }, 3000);
  }
}

function calcDays(due){
  if(!due)return null;
  return Math.max(0,Math.ceil((new Date(due)-new Date())/864e5));
}

function addBaby(){
  const id='baby_'+Date.now();
  G.babies.push({id,name:'New Baby',data:{dailyDiaries:{},mamaWeekly:{},birthInfo:{},dueDate:null,babyNick:'New Baby',selectedFont:'maru',appBgImage:null,currentWeek:12,roadmapChecks:{}}});
  saveG();
  openBaby(id);
}

function editName(id,e){
  e.stopPropagation();
  const b=G.babies.find(x=>x.id===id);if(!b)return;
  const n=prompt('名前を変更',b.name);
  if(n===null)return;
  b.name=n||b.name;if(b.data)b.data.babyNick=b.name;
  saveG();renderCoverBabies();
}

function openBaby(id){
  G.activeBabyId=id;saveG();
  CW=D().currentWeek||12;FW=CW;
  document.getElementById('coverPage').style.display='none';
  const ma=document.getElementById('mainApp');ma.style.display='flex';
  applyAppBg();initMainApp();
  if(/iphone|ipad|ipod/i.test(navigator.userAgent)&&!window.navigator.standalone&&!localStorage.getItem('installDismissed'))
    document.getElementById('installBanner').style.display='block';
}

function goToCover(){
  document.getElementById('mainApp').style.display='none';
  document.getElementById('coverPage').style.display='block';
  renderCoverBabies();
}

function openCoverSettings(){
  renderBgCustoms();
  document.getElementById('coverModal').style.display='flex';
}
function closeCoverSettings(){document.getElementById('coverModal').style.display='none';}

function renderBgCustoms(){
  const c=document.getElementById('bgCustoms');if(!c)return;
  const off=COVER_PRESETS.length;
  c.innerHTML=G.customBgs.map((bg,i)=>
    `<div style="width:80px;height:80px;border-radius:12px;background:url(${bg});background-size:cover;background-position:center;border:3px solid ${G.coverBgIndex===i+off?'var(--pink)':'var(--border)'};cursor:pointer;position:relative;flex-shrink:0" onclick="selBg(${i+off})">

// ── 画像圧縮 ───────────────────────────────────────────────
function compress(file,MAX,q,cb){
  const img=new Image(),r=new FileReader();
  r.onload=ev=>{img.onload=()=>{
    const c=document.createElement('canvas');let w=img.width,h=img.height;
    if(w>MAX||h>MAX){if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;}}
    c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);cb(c.toDataURL('image/jpeg',q));
  };img.src=ev.target.result;};r.readAsDataURL(file);
}

// ── 写真入力セットアップ ───────────────────────────────────
function setupInput(id,type,getKey,getPhotos,setPhotos,gridId){
  const old=document.getElementById(id);if(!old)return;
  const el=old.cloneNode(true);old.parentNode.replaceChild(el,old);
  el.addEventListener('change',e=>{
    const files=Array.from(e.target.files);const key=getKey();let photos=getPhotos(key);let n=0;
    files.forEach(f=>compress(f,800,0.72,b=>{
      if(type!=='appbg'&&type!=='coverbg')photos.push(b);
      else photos=[b];
      setPhotos(key,photos);n++;
      if(n===files.length){saveG();if(gridId)renderGrid(gridId,photos,type,key);if(type!=='appbg'&&type!=='coverbg')showToast(`📷 ${n}枚追加しました`);}
    }));
    e.target.value='';
  });
}

function renderGrid(gridId,photos,type,key){
  const g=document.getElementById(gridId);if(!g)return;
  if(!photos||!photos.length){g.innerHTML='';return;}
  g.innerHTML=photos.map((s,i)=>`<div class="photo-thumb"><img src="${s}"><button class="rm-btn" onclick="rmPhoto('${type}','${key}',${i})">✕</button></div>`).join('');
}
function rmPhoto(type,key,i){
  const d=D();if(!d)return;
  if(type==='daily'){if(!d.dailyDiaries[key])return;d.dailyDiaries[key].photos.splice(i,1);renderGrid('dailyPhotoGrid',d.dailyDiaries[key].photos,type,key);}
  else if(type==='mama'){if(!d.mamaWeekly[key])return;d.mamaWeekly[key].photos.splice(i,1);renderGrid('mamaPhotoGrid',d.mamaWeekly[key].photos,type,key);}
  else if(type==='family'){if(!d.birthInfo||!d.birthInfo.familyPhotos)return;d.birthInfo.familyPhotos.splice(i,1);renderGrid('familyPhotoGrid',d.birthInfo.familyPhotos,type,key);}
  saveG();
}

// ── Baby SVG ───────────────────────────────────────────────
function drawBaby(el,w){
  if(!el)return;const p=Math.min(0.3+w*0.018,1);const cx=40,cy=44,hr=16*p,bh=18*p,bw=12*p;
  const sk=w<10?'#FAC775':w<20?'#F0997B':'#F4C0D1';let s='';
  s+=`<circle cx="${cx}" cy="${cy-bh/2-hr}" r="${hr}" fill="${sk}" stroke="#E8A0B0" stroke-width="1.2"/>`;
  s+=`<ellipse cx="${cx}" cy="${cy}" rx="${bw}" ry="${bh/2}" fill="${sk}" stroke="#E8A0B0" stroke-width="1.2"/>`;
  if(w>=8){const a=8*p;s+=`<line x1="${cx-bw}" y1="${cy-bh/4}" x2="${cx-bw-a}" y2="${cy}" stroke="${sk}" stroke-width="${3*p}" stroke-linecap="round"/>`;s+=`<line x1="${cx+bw}" y1="${cy-bh/4}" x2="${cx+bw+a}" y2="${cy}" stroke="${sk}" stroke-width="${3*p}" stroke-linecap="round"/>`;}
  if(w>=10){const l=10*p;s+=`<line x1="${cx-5*p}" y1="${cy+bh/2}" x2="${cx-6*p}" y2="${cy+bh/2+l}" stroke="${sk}" stroke-width="${3*p}" stroke-linecap="round"/>`;s+=`<line x1="${cx+5*p}" y1="${cy+bh/2}" x2="${cx+6*p}" y2="${cy+bh/2+l}" stroke="${sk}" stroke-width="${3*p}" stroke-linecap="round"/>`;}
  if(w>=14){const ey=cy-bh/2-hr*1.15,er=1.8*p;s+=`<circle cx="${cx-5*p}" cy="${ey}" r="${er}" fill="#885566"/>`;s+=`<circle cx="${cx+5*p}" cy="${ey}" r="${er}" fill="#885566"/>`;s+=`<path d="M${cx-hr*0.45} ${cy-bh/2-hr*0.65} Q${cx} ${cy-bh/2-hr*0.45} ${cx+hr*0.45} ${cy-bh/2-hr*0.65}" stroke="#D4537E" stroke-width="1.2" fill="none" stroke-linecap="round"/>`;}
  el.innerHTML=s;
}

function wt(ctx,text,mw){const l=[];let ln='';for(const c of text){if(ctx.measureText(ln+c).width>mw){l.push(ln);ln=c;}else ln+=c;}if(ln)l.push(ln);return l;}
function rr(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();}

  const cols=Math.min(weeks.length,4),rows=Math.ceil(weeks.length/cols);
  const cW=480,cH=520,pad=40,hdr=110;const W=cols*cW+pad*2,H=rows*cH+pad*2+hdr+60;

  ctx.fillStyle='#D4537E';ctx.font=cf(Math.round(W*.04));ctx.textAlign='center';ctx.fillText((d.birthInfo&&d.birthInfo.bookTitle)||'ママのお腹の成長記録',W/2,pad+55);

    const dt=()=>{if(ent.text){ctx.fillStyle='#555';ctx.font=cf(Math.round(W*.013));wt(ctx,ent.text,cW-44).slice(0,3).forEach((l,li)=>ctx.fillText(l,x+16,y+350+li*24));}pend--;if(pend<=0)fin();};
    if(ent.photos&&ent.photos.length){const img=new Image();img.onload=()=>{ctx.save();rr(ctx,x+16,y+58,cW-32,260,10);ctx.clip();const ir=(cW-32)/260,ir2=img.width/img.height;let sx=0,sy=0,sw=img.width,sh=img.height;if(ir2>ir){sw=img.height*ir;sx=(img.width-sw)/2;}else{sh=img.width/ir;sy=(img.height-sh)/2;}ctx.drawImage(img,sx,sy,sw,sh,x+16,y+58,cW-32,260);ctx.restore();dt();};img.src=ent.photos[0];}

  });

function exportMonthCal(year,month){
  const d=D();if(!d)return;
  const days=new Date(year,month,0).getDate();const entries=[];
  for(let dd=1;dd<=days;dd++){const k=`${year}-${month}-${dd}`;const e=d.dailyDiaries[k];if(e&&(e.text||(e.photos&&e.photos.length)))entries.push({day:dd,key:k,entry:e});}
  if(!entries.length){showToast('⚠️ この月の記録がありません');return;}
  const W=2480,H=3508,pad=80,hdr=220;const canvas=document.getElementById('exportCanvas');canvas.width=W;canvas.height=H;const ctx=canvas.getContext('2d');
  const gr=ctx.createLinearGradient(0,0,W,H);gr.addColorStop(0,'#FFF5F8');gr.addColorStop(1,'#F0FBF6');ctx.fillStyle=gr;ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#D4537E';ctx.font=cf(96);ctx.textAlign='center';ctx.fillText(`${year}年${month}月`,W/2,pad+80);
  ctx.fillStyle='#aaa';ctx.font=cf(48);ctx.fillText('パパ妊娠日記',W/2,pad+148);
  const cols=2,cW=(W-pad*2-40)/cols,cH=440;
  let pend=entries.filter(({entry})=>entry.photos&&entry.photos.length).length||1;
  entries.forEach(({day,entry},i)=>{
    const col=i%cols,row=Math.floor(i/cols);const x=pad+col*(cW+40),y=hdr+pad+row*(cH+30);
    ctx.fillStyle='rgba(255,255,255,.92)';ctx.shadowColor='rgba(212,83,126,.12)';ctx.shadowBlur=20;rr(ctx,x,y,cW,cH,20);ctx.fill();ctx.shadowBlur=0;
    ctx.fillStyle='#D4537E';rr(ctx,x+20,y+18,180,50,25);ctx.fill();ctx.fillStyle='white';ctx.font=cf(32);ctx.textAlign='left';ctx.fillText(`${month}月${day}日`,x+30,y+53);
    const dc=()=>{if(entry.text){ctx.fillStyle='#333';ctx.font=cf(34);const sx=entry.photos&&entry.photos.length?x+240:x+24,mw=entry.photos&&entry.photos.length?cW-260:cW-50;wt(ctx,entry.text,mw).slice(0,6).forEach((l,li)=>ctx.fillText(l,sx,y+105+li*52));}pend--;if(pend<=0)finM();};
    if(entry.photos&&entry.photos.length){const img=new Image();img.onload=()=>{ctx.save();rr(ctx,x+20,y+78,200,200,12);ctx.clip();const ir=1,ir2=img.width/img.height;let sx=0,sy=0,sw=img.width,sh=img.height;if(ir2>ir){sw=img.height;sx=(img.width-sw)/2;}else{sh=img.width;sy=(img.height-sh)/2;}ctx.drawImage(img,sx,sy,sw,sh,x+20,y+78,200,200);ctx.restore();dc();};img.src=entry.photos[0];}else dc();
  });
  function finM(){ctx.fillStyle='#ccc';ctx.font=cf(44);ctx.textAlign='center';ctx.fillText('#パパ日記 #妊娠記録',W/2,H-50);const lnk=document.createElement('a');lnk.download=`papa_${year}_${month}.png`;lnk.href=canvas.toDataURL('image/png');lnk.click();showToast('📥 カレンダーを保存しました！');}
}

function openBirthModal(){const d=D();if(!d)return;const b=d.birthInfo||{};document.getElementById('bookTitle').value=b.bookTitle||'';document.getElementById('babyNameBirth').value=b.babyName||'';document.getElementById('birthDatetime').value=b.datetime||'';document.getElementById('birthPlace').value=b.place||'';document.getElementById('birthWeight').value=b.weight||'';document.getElementById('birthHeight').value=b.height||'';document.getElementById('birthMessage').value=b.message||'';document.getElementById('papaName').value=b.papaName||'';document.getElementById('mamaName').value=b.mamaName||'';if(b.gender)document.querySelectorAll('input[name=gender]').forEach(r=>{if(r.value===b.gender)r.checked=true;});document.getElementById('siblingRows').innerHTML='';if(b.siblings)b.siblings.forEach(s=>addSiblingRow(s));renderGrid('familyPhotoGrid',b.familyPhotos||[],'family',0);const prev=document.getElementById('coverBgPreview');if(prev){if(b.coverBg){prev.style.backgroundImage=`url(${b.coverBg})`;prev.classList.add('has-bg');}else{prev.style.backgroundImage='';prev.classList.remove('has-bg');}}document.querySelectorAll('.font-btn').forEach(btn=>btn.classList.toggle('active',btn.dataset.font===(d.selectedFont||'maru')));document.getElementById('birthModal').style.display='flex';}
function closeBirthModal(){document.getElementById('birthModal').style.display='none';}
function clearCoverBg(){const d=D();if(!d||!d.birthInfo)return;d.birthInfo.coverBg=null;saveG();const p=document.getElementById('coverBgPreview');if(p){p.style.backgroundImage='';p.classList.remove('has-bg');}showToast('背景を削除しました');}
function saveBirthInfo(){const d=D();if(!d)return;const g=[...document.querySelectorAll('input[name=gender]')].find(r=>r.checked);d.birthInfo=Object.assign(d.birthInfo||{},{bookTitle:document.getElementById('bookTitle').value,babyName:document.getElementById('babyNameBirth').value,gender:g?g.value:'',datetime:document.getElementById('birthDatetime').value,place:document.getElementById('birthPlace').value,weight:document.getElementById('birthWeight').value,height:document.getElementById('birthHeight').value,message:document.getElementById('birthMessage').value,papaName:document.getElementById('papaName').value,mamaName:document.getElementById('mamaName').value,siblings:getSiblings(),familyPhotos:(d.birthInfo&&d.birthInfo.familyPhotos)||[],coverBg:(d.birthInfo&&d.birthInfo.coverBg)||null});saveG();closeBirthModal();showToast('⭐ 誕生情報を保存しました！');}
function selectFont(k,btn){const d=D();if(!d)return;d.selectedFont=k;saveG();document.querySelectorAll('.font-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}
function addSiblingRow(v=''){const c=document.getElementById('siblingRows');const div=document.createElement('div');div.className='sibling-row';div.innerHTML=`<input type="text" class="text-input" placeholder="例：お兄ちゃん（田中 次郎）" value="${v}"><button onclick="this.parentElement.remove()"><i class="ti ti-x"></i></button>`;c.appendChild(div);}
function getSiblings(){return[...document.querySelectorAll('#siblingRows .sibling-row input')].map(i=>i.value).filter(v=>v.trim());}

// ── View ─────────────────────────────────────────────────
function showView(name){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.top-tab').forEach(b=>b.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
  if(name==='flip'){FW=CW;updateFlip();}
  if(name==='calendar')buildCal();
  if(name==='export')updateInstaPreview();
  if(name==='roadmap')buildRoadmap();
  document.getElementById('mainContent').scrollTo(0,0);
}

// ── Toast / Install ───────────────────────────────────────
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);}
function dismissInstall(){document.getElementById('installBanner').style.display='none';localStorage.setItem('installDismissed','1');}
if('serviceWorker' in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));

// ── Init ────────────────────────────────────────────────
// 古いキーをすべてクリアして新バージョンで起動
(function(){
  const oldKeys=['papaDiaries','papaDiaryState','papaDiaryV2','papaDiaryV3','papaDiaryV4','papaDiaryV5'];
  oldKeys.forEach(k=>{try{localStorage.removeItem(k);}catch(e){}});
})();
loadG();
initCoverPage();
if(G.activeBabyId&&G.babies.find(b=>b.id===G.activeBabyId)){openBaby(G.activeBabyId);}

</script>
</body>
</html>
